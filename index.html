<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Preview Card | Desktop</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="card">
       <div class="card__image">
                <img src="perfume.jpg" alt="Perfume Gabrielle Chanel">
            </div>
            <div class="card__content">
                <p class="product-category">PERFUME</p>
                <h1>Gabrielle Essence Eau De Parfum</h1>
                <p class="product-description">
                    Uma interpretação floral, solar e voluptuosa composta por Olivier Polge, 
                    Perfumista-Criador da Casa de CHANEL.
                </p>
                <div class="price-container">
                    <span class="price-current">R$149.99</span>
                    <span class="price-old">R$169.99</span>
                </div>
                <button class="btn-add-to-cart">
                    <img src="images/icon-cart.svg" alt="" aria-hidden="true">
                    Add ao Carrinho
                </button>
            </div>
        </div>
    </main>
</body>
</html>
